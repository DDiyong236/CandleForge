spring:
  application:
    name: candleforge

  # DB 접속 — docker-compose의 timescaledb. 환경변수로 덮어쓸 수 있게 기본값 지정.
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:candleforge}
    username: ${DB_USER:candleforge}
    password: ${DB_PASSWORD:candleforge}

  jpa:
    hibernate:
      ddl-auto: validate      # 스키마는 SQL(01_init.sql)로 관리. Hibernate가 테이블을 만들지 않음.
    open-in-view: false        # 뷰 렌더링까지 DB 세션을 끌고 가지 않음(권장)
    properties:
      hibernate:
        format_sql: true

# 개발 중 상태 확인용: /actuator/health 에서 DB 연결 상태까지 상세 노출
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

# 수집기 설정
candleforge:
  upbit:
    enabled: true
    endpoint: wss://api.upbit.com/websocket/v1
    dynamicCodes: true      # 전체 KRW 마켓 자동 구독
    codes:                  # dynamicCodes=false일 때만 사용
      - KRW-BTC
