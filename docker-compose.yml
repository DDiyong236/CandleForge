# 로컬 개발용 인프라: TimescaleDB(시계열 저장) + Redis(캐시)
# 사용법:  docker compose up -d   (백그라운드 기동)
#          docker compose down    (정지)   /   docker compose down -v (데이터까지 삭제)

services:
  # 시계열 저장소 — 체결 원본/캔들 저장. PostgreSQL 확장이라 JPA/드라이버 그대로 사용.
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: candleforge-timescaledb
    environment:
      POSTGRES_USER: candleforge
      POSTGRES_PASSWORD: candleforge
      POSTGRES_DB: candleforge
    ports:
      - "5432:5432"          # 호스트:컨테이너 — 앱이 localhost:5432로 접속
    volumes:
      - pgdata:/var/lib/postgresql/data        # 데이터 영속화(컨테이너 지워도 유지)
      - ./db/init:/docker-entrypoint-initdb.d  # 최초 기동 시 이 폴더의 .sql 자동 실행
    healthcheck:                                # DB가 "정말 준비됐는지" 확인용
      test: ["CMD-SHELL", "pg_isready -U candleforge -d candleforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 캐시 — Phase 3(인기 조회 구간 캐싱)부터 실사용. 미리 띄워둠.
  redis:
    image: redis:7-alpine
    container_name: candleforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:   # named volume — TimescaleDB 데이터 보관
